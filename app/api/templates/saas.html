<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SmartBridge — Detectá errores en tus datos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      background: #17171f;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 40px 44px;
      max-width: 560px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 99px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.25;
      color: #f0f0fa;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #8b8ba8;
      font-size: 15px;
      line-height: 1.55;
      margin-bottom: 28px;
    }

    /* ── Ejemplo ── */
    .example {
      background: #111118;
      border: 1px solid #252530;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 28px;
    }
    .example-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #555570;
      margin-bottom: 10px;
    }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th {
      text-align: left;
      color: #6c6c88;
      font-weight: 600;
      padding: 4px 8px;
      border-bottom: 1px solid #252530;
    }
    td { padding: 5px 8px; color: #cccce0; font-variant-numeric: tabular-nums; }
    tr:last-child td { border: none; }

    /* ── Upload zone ── */
    .upload-zone {
      display: block;
      width: 100%;
      border: 1.5px dashed #2f2f42;
      border-radius: 10px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 16px;
      transition: border-color .2s, background .2s;
    }
    .upload-zone:hover { border-color: #6366f1; background: #1a1a28; }
    .upload-zone.has-file { border-color: #22c55e; border-style: solid; }

    .upload-zone input[type="file"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .upload-icon { font-size: 22px; margin-bottom: 6px; }
    .upload-title { font-size: 13px; font-weight: 600; color: #c0c0d8; margin-bottom: 2px; }
    .upload-hint { font-size: 11px; color: #555570; }
    .upload-name { font-size: 11px; color: #22c55e; margin-top: 4px; word-break: break-all; }

    /* ── Error ── */
    .error-box {
      background: #1f1115;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 12px 16px;
      color: #fca5a5;
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* ── Button ── */
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    button[type="submit"]:hover { background: #4f52d8; }
    button[type="submit"]:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">SmartBridge · MVP</div>

    <h1>Tirá tu Excel y te digo qué está mal</h1>
    <p class="subtitle">No importa cómo esté armado. Lo entendemos igual.</p>

    <div class="example">
      <div class="example-label">Ejemplo: así puede venir tu archivo</div>
      <table>
        <thead>
          <tr><th>Pedido</th><th>Importe</th></tr>
        </thead>
        <tbody>
          <tr><td>A1</td><td>$&nbsp;1.000</td></tr>
          <tr><td>A2</td><td>$&nbsp;2.500,50</td></tr>
          <tr><td>A3</td><td>(350)</td></tr>
        </tbody>
      </table>
    </div>

    {% if error %}
      <div class="error-box">⚠ {{ error }}</div>
    {% endif %}

    <form action="/saas/upload" method="post" enctype="multipart/form-data" id="saas-form">
      <label class="upload-zone" id="zone-main" for="file">
        <input type="file" id="file" name="file" accept=".csv,.xlsx,.xls" required onchange="markFile('zone-main','name-main',this)" />
        <div class="upload-icon">📄</div>
        <div class="upload-title">Subí tu archivo</div>
        <div class="upload-hint">CSV o Excel · ventas, facturas, lo que tengas</div>
        <div class="upload-name" id="name-main"></div>
      </label>

      <button type="submit" style="margin-top: 16px;">Analizar archivo</button>
    </form>
  </div>

  <script>
    function markFile(zoneId, nameId, input) {
      const zone = document.getElementById(zoneId);
      const nameEl = document.getElementById(nameId);
      if (input.files && input.files[0]) {
        zone.classList.add('has-file');
        nameEl.textContent = input.files[0].name;
      } else {
        zone.classList.remove('has-file');
        nameEl.textContent = '';
      }
    }
  </script>
</body>
</html>
